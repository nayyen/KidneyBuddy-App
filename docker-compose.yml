services:
  db:
    image: postgres:16
    container_name: kidneybuddy-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kidneybuddy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kidneybuddy}
      POSTGRES_DB: ${POSTGRES_DB:-kidneybuddy}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kidneybuddy} -d ${POSTGRES_DB:-kidneybuddy}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kidneybuddy-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://kidneybuddy:kidneybuddy@db:5432/kidneybuddy}
      NODE_ENV: ${NODE_ENV:-development}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:naykim426@gmail.com}
      GROQ_API_KEY: ${GROQ_API_KEY}
    ports:
      - "4000:4000"
    volumes:
      - uploads:/app/uploads
      - ./backend/src:/app/src
    networks:
      - backend-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      # NEXT_PUBLIC_* vars are inlined into the client bundle at `next build`
      # time, NOT read from the running container's environment — the
      # `environment:` block below only affects the already-built runtime
      # container, so these MUST also be passed as build args (quick-260705-9n4
      # task 4 audit: NEXT_PUBLIC_VAPID_PUBLIC_KEY was silently never reaching
      # the client bundle, which made subscribeAndRegister() no-op).
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
        NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${NEXT_PUBLIC_VAPID_PUBLIC_KEY}
    container_name: kidneybuddy-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${NEXT_PUBLIC_VAPID_PUBLIC_KEY}
    ports:
      - "3000:3000"
    networks:
      - backend-network

volumes:
  pgdata:
  uploads:  # Persists medication photo uploads across backend container restarts (CLAUDE.md: local Docker volume for file storage)

networks:
  backend-network:
    driver: bridge
